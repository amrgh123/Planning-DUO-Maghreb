<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tableau de Planning Équipe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ============================================ */
        /* VERSION RESPONSIVE - TV 32" + SMARTPHONE */
        /* ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
        }
        
        .tv-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
        }
        
        .tv-header {
            background: linear-gradient(135deg, #2c3e50, #4a6491);
            padding: 10px 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        .tv-header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .tv-clock {
            text-align: right;
        }
        
        .tv-time {
            font-size: 1rem;
            font-weight: 700;
            background: rgba(0,0,0,0.2);
            padding: 5px 10px;
            border-radius: 8px;
        }
        
        .tv-date {
            font-size: 0.75rem;
            margin-top: 2px;
            opacity: 0.9;
        }
        
        .tv-main-area {
            flex: 1;
            padding: 8px;
            overflow-x: auto;
        }
        
        .table-wrapper {
            background-color: #2c3e50;
            border-radius: 8px;
            overflow-x: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        /* Tableau responsive - permet le défilement horizontal sur smartphone */
        .table-responsive {
            min-width: 800px;
        }
        
        .table-header {
            background: linear-gradient(135deg, #34495e, #2c3e50);
            color: white;
            padding: 8px 3px;
            display: grid;
            grid-template-columns: 5% 13% 16% 5% 18% 10% 6% 18% 5%;
            text-align: center;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            flex-shrink: 0;
        }
        
        .table-body {
            overflow-x: auto;
        }
        
        .rows-container {
            min-width: 800px;
        }
        
        .table-row {
            display: grid;
            grid-template-columns: 5% 13% 16% 5% 18% 10% 6% 18% 5%;
            text-align: center;
            align-items: center;
            background-color: white;
            border-bottom: 1px solid #3a506b;
            min-height: 35px;
            font-size: 0.7rem;
            padding: 4px 3px;
            color: #333;
        }
        
        .table-row:nth-child(even) {
            background-color: #f8f9fa;
        }
        
        .today-row {
            background-color: #e74c3c !important;
            border-left: 6px solid #c0392b;
            color: white !important;
            animation: pulseToday 2s infinite;
        }
        
        .today-row .table-cell {
            color: white !important;
            font-weight: 700;
        }
        
        .today-row-empty-type {
            background-color: #c0392b !important;
            border-left: 6px solid #962d22;
            color: white !important;
            animation: pulseTodayDark 2s infinite;
        }
        
        @keyframes pulseToday {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }
        
        @keyframes pulseTodayDark {
            0% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(192, 57, 43, 0); }
            100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0); }
        }
        
        .table-cell {
            padding: 4px 2px;
            overflow: visible !important;
            white-space: normal !important;
            word-wrap: break-word;
            line-height: 1.2;
            border-right: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .table-cell.left-align {
            justify-content: flex-start;
            text-align: left;
            padding-left: 8px;
        }
        
        .empty-cell {
            color: #95a5a6;
            font-style: italic;
        }
        
        .triangle-cell {
            color: #e74c3c;
            font-weight: 700;
        }
        
        .triangle-cell::before {
            content: "▲";
            margin-right: 3px;
            font-size: 0.7rem;
            color: #e74c3c;
        }
        
        .empty-type-row {
            color: #7f8c8d !important;
            background-color: #f1f2f3 !important;
        }
        
        .equipe-names {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
        }
        
        .equipe-name {
            padding: 1px 0;
            font-size: 0.65rem;
            color: #333;
        }
        
        .equipe-name:not(:last-child)::after {
            content: " - ";
            margin-left: 4px;
        }
        
        .today-row .equipe-name {
            color: white;
        }
        
        .tv-status {
            background-color: rgba(0,0,0,0.8);
            color: white;
            padding: 6px 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            font-size: 0.65rem;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
        
        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
        }
        
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .connection-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26,26,26,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }
        
        .notification {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #27ae60;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            z-index: 10000;
            display: none;
            font-size: 0.75rem;
        }
        
        .modal-content {
            background: white;
            padding: 15px;
            border-radius: 8px;
            max-width: 90%;
            width: 400px;
            text-align: center;
            color: #333;
        }
        
        .new-client-highlight {
            animation: blinkNewClient 1s infinite alternate;
            font-weight: 800 !important;
            color: #ffffff !important;
            border-radius: 4px;
            padding: 2px 4px !important;
        }
        
        .new-client-highlight::before {
            content: "🆕";
            margin-right: 4px;
            font-size: 0.7rem;
        }
        
        .updated-time-highlight {
            animation: blinkUpdatedTime 1s infinite alternate;
            font-weight: 800 !important;
            color: #ffffff !important;
            border-radius: 4px;
            padding: 2px 4px !important;
        }
        
        .updated-time-highlight::before {
            content: "🕒";
            margin-right: 4px;
            font-size: 0.7rem;
        }
        
        .new-count-badge {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            padding: 1px 4px;
            border-radius: 10px;
            font-size: 0.6rem;
            margin-left: 3px;
        }
        
        /* TV 32" (écran large) */
        @media (min-width: 1200px) {
            .tv-header h1 { font-size: 1.8rem; }
            .tv-time { font-size: 1.5rem; padding: 8px 15px; }
            .tv-date { font-size: 1rem; }
            .table-header { font-size: 1rem; padding: 10px 3px; }
            .table-row { font-size: 0.9rem; min-height: 40px; }
            .equipe-name { font-size: 0.85rem; }
            .tv-status { font-size: 0.85rem; }
            .refresh-btn { font-size: 0.9rem; padding: 6px 12px; }
        }
        
        @keyframes blinkNewClient {
            0% { background-color: #2ecc71; }
            100% { background-color: #27ae60; }
        }
        
        @keyframes blinkUpdatedTime {
            0% { background-color: #f39c12; }
            100% { background-color: #e67e22; }
        }
    </style>
</head>
<body>
    <div class="tv-container">
        <div class="tv-header">
            <h1>📅 PLANNING DES PROJETS</h1>
            <div class="tv-clock">
                <div id="realTimeClock" class="tv-time">--:--:--</div>
                <div id="currentDate" class="tv-date">-- --- ----</div>
            </div>
        </div>
        
        <div class="tv-main-area">
            <div class="table-wrapper">
                <div class="table-header">
                    <div>Type</div><div>Client</div><div>Projet</div><div>Imp</div><div>Lieu</div><div>Date</div><div>Heure</div><div>Équipe</div><div>Véhicule</div>
                </div>
                <div class="table-body">
                    <div class="rows-container" id="rowsContainer"></div>
                </div>
            </div>
        </div>
        
        <div class="tv-status">
            <div>
                <span id="totalRows">0</span> interventions | 
                <span id="todayCount">0</span> aujourd'hui
                <span class="connection-status" id="connectionStatus">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span id="statusText">Vérification...</span>
                </span>
                <span id="newClientsIndicator" style="margin-left: 8px; display: none;">
                    🆕 <span id="newClientsCount">0</span> nouveau(x)
                    <span class="new-count-badge" id="newCountBadge">0</span>
                </span>
            </div>
            <div>
                <button id="refreshBtn" class="refresh-btn">🔄 ACTUALISER</button>
                <button onclick="showEditLinkModal()" class="btn-outline-light ms-2" style="background:transparent;border:1px solid white;color:white;padding:4px 8px;border-radius:5px;margin-left:5px">🔗 Lien</button>
            </div>
            <div id="lastUpdated">MAJ: <span id="lastUpdateTime">--:--</span></div>
        </div>
        
        <div class="warning-message" id="warningMessage" style="display:none">⚠️ TROP DE LIGNES</div>
        <div id="loading" class="loading-overlay d-none"><div class="spinner-border text-primary"></div><p>Chargement...</p></div>
        <div id="notification" class="notification"></div>
        
        <div id="editLinkModal" class="connection-modal">
            <div class="modal-content">
                <h3 style="color:#3498db">✏️ Mettre à jour le lien</h3>
                <div style="text-align:left;margin:10px 0">
                    <label>Lien actuel :</label>
                    <div style="background:#f8f9fa;padding:6px;border-radius:4px;font-size:0.7rem;word-break:break-all" id="currentLinkDisplay"></div>
                    <label style="margin-top:10px">Nouveau lien :</label>
                    <input type="text" id="newSheetLink" style="width:100%;padding:6px;border:1px solid #3498db;border-radius:4px">
                </div>
                <div id="linkStatus" style="padding:6px;border-radius:4px;margin:8px 0;display:none"></div>
                <div>
                    <button onclick="saveNewLink()" class="btn btn-success" style="font-size:0.7rem;padding:4px 8px">💾 Enregistrer</button>
                    <button onclick="hideEditLinkModal()" class="btn btn-secondary" style="font-size:0.7rem;padding:4px 8px">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - VOTRE LIEN QUI FONCTIONNE
        // ============================================
        const DEFAULT_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSSg3azNidCrk7DOWOCJPCjoplrmuMB9LUs876C4EcRWyePwzBpE8CRbEQSreOwHUC0x6Ux9w8HTvu7/pub?gid=432489701&single=true&output=csv';
        
        const AUTO_REFRESH_MINUTES = 5;
        const HIGHLIGHT_DURATION = 60 * 60 * 1000;
        
        let GOOGLE_SHEET_URL = localStorage.getItem('saved_sheet_url') || DEFAULT_SHEET_URL;
        
        let previousData = [];
        let newClients = new Map();
        let updatedTimes = new Map();
        let connectionStatus = 'checking';
        
        // ============================================
        // FONCTIONS
        // ============================================
        
        function updateClock() {
            const now = new Date();
            document.getElementById('realTimeClock').textContent = now.toLocaleTimeString('fr-FR');
            document.getElementById('currentDate').textContent = now.toLocaleDateString('fr-FR', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            }).replace(/^\w/, c => c.toUpperCase());
        }
        
        function showNotification(msg) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 3000);
        }
        
        function updateConnectionStatus(status, msg) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            connectionStatus = status;
            if(indicator) indicator.style.backgroundColor = status === 'connected' ? '#2ecc71' : (status === 'disconnected' ? '#e74c3c' : '#f39c12');
            if(text) text.textContent = status === 'connected' ? 'Connecté' : (status === 'disconnected' ? 'Déconnecté' : 'Vérification...');
            if(msg) console.log(msg);
        }
        
        function hideAllModals() {
            document.getElementById('editLinkModal').style.display = 'none';
        }
        
        function showEditLinkModal() {
            hideAllModals();
            document.getElementById('editLinkModal').style.display = 'flex';
            document.getElementById('currentLinkDisplay').textContent = GOOGLE_SHEET_URL;
            document.getElementById('newSheetLink').value = '';
            document.getElementById('linkStatus').style.display = 'none';
        }
        
        function hideEditLinkModal() { hideAllModals(); }
        
        function saveHighlightState() {
            try {
                localStorage.setItem('newClients', JSON.stringify(Array.from(newClients.entries())));
                localStorage.setItem('updatedTimes', JSON.stringify(Array.from(updatedTimes.entries())));
            } catch(e) {}
        }
        
        function loadHighlightState() {
            try {
                const savedNewClients = localStorage.getItem('newClients');
                const savedUpdatedTimes = localStorage.getItem('updatedTimes');
                if(savedNewClients) newClients = new Map(JSON.parse(savedNewClients));
                if(savedUpdatedTimes) updatedTimes = new Map(JSON.parse(savedUpdatedTimes));
            } catch(e) {}
        }
        
        function cleanOldHighlights() {
            const now = Date.now();
            let cleaned = false;
            for(const [id, ts] of newClients) if(now - ts > HIGHLIGHT_DURATION) { newClients.delete(id); cleaned = true; }
            for(const [id, ts] of updatedTimes) if(now - ts > HIGHLIGHT_DURATION) { updatedTimes.delete(id); cleaned = true; }
            if(cleaned) { saveHighlightState(); updateNewClientsIndicator(); }
        }
        
        function updateNewClientsIndicator() {
            const indicator = document.getElementById('newClientsIndicator');
            const countEl = document.getElementById('newClientsCount');
            const badge = document.getElementById('newCountBadge');
            const total = newClients.size + updatedTimes.size;
            if(total > 0) {
                indicator.style.display = 'inline';
                countEl.textContent = total;
                badge.textContent = total;
            } else {
                indicator.style.display = 'none';
            }
        }
        
        function detectChanges(currentRows) {
            if(previousData.length === 0) { previousData = currentRows.slice(); return; }
            const now = Date.now();
            const prevMap = new Map(previousData.map(r => [r.uniqueId, r]));
            let newAdded = 0, timesUp = 0;
            
            currentRows.forEach(row => {
                const id = row.uniqueId;
                if(!prevMap.has(id)) {
                    const similar = previousData.find(r => r.client === row.client && r.projet === row.projet && r.date === row.date);
                    if(similar && similar.heure !== row.heure) {
                        updatedTimes.set(id, now);
                        timesUp++;
                    } else {
                        newClients.set(id, now);
                        newAdded++;
                    }
                } else {
                    const prev = prevMap.get(id);
                    if(prev.heure !== row.heure) {
                        if(newClients.has(id)) newClients.delete(id);
                        updatedTimes.set(id, now);
                        timesUp++;
                    }
                }
            });
            
            const currentIds = new Set(currentRows.map(r => r.uniqueId));
            for(const [id] of newClients) if(!currentIds.has(id)) newClients.delete(id);
            for(const [id] of updatedTimes) if(!currentIds.has(id)) updatedTimes.delete(id);
            
            saveHighlightState();
            updateNewClientsIndicator();
            
            if(newAdded > 0 || timesUp > 0) {
                let msg = '';
                if(newAdded > 0) msg += `${newAdded} nouveau(x) client(s) `;
                if(timesUp > 0) { if(msg) msg += 'et '; msg += `${timesUp} heure(s) modifiée(s)`; }
                showNotification(`🎯 ${msg}`);
            }
            previousData = currentRows.slice();
        }
        
        function parseCSV(text) {
            const rows = [];
            const lines = text.split(/\r?\n/);
            for(let line of lines) {
                if(!line.trim()) continue;
                const row = [];
                let current = '', inQuotes = false;
                for(let i=0; i<line.length; i++) {
                    const c = line[i];
                    if(c === '"') inQuotes = !inQuotes;
                    else if(c === ',' && !inQuotes) { row.push(current.trim()); current = ''; }
                    else current += c;
                }
                row.push(current.trim());
                rows.push(row);
            }
            return rows;
        }
        
        function processDataWithFilter(rows) {
            const now = new Date(); now.setHours(0,0,0,0);
            const futureRows = [];
            let todayCount = 0;
            let startIndex = 0;
            
            if(rows.length > 0) {
                const firstRow = rows[0];
                const headerKeywords = ['type', 'client', 'projet', 'lieu', 'date', 'heure', 'équipe', 'equipe', 'véhicule'];
                const isHeader = firstRow.some(cell => cell && typeof cell === 'string' && headerKeywords.some(k => cell.toLowerCase().includes(k)));
                if(isHeader) startIndex = 1;
            }
            
            const TYPE=0, CLIENT=1, PROJET=2, IMP=21, LIEU=3, DATE=4, HEURE=5, VEHICULE=22;
            const EQUIPE_START=6, EQUIPE_END=20;
            const maxRows = 20;
            let rowCount = 0;
            
            for(let i=startIndex; i<rows.length && rowCount<maxRows; i++) {
                const row = rows[i];
                if(row.length <= DATE) continue;
                const dateStr = row[DATE] || '';
                if(!dateStr) continue;
                
                let dateObj = null, isToday = false;
                if(dateStr.includes('/')) {
                    try {
                        const parts = dateStr.split('/');
                        if(parts.length === 3) {
                            const day = parseInt(parts[0]), month = parseInt(parts[1])-1, year = parseInt(parts[2]);
                            if(!isNaN(day) && !isNaN(month) && !isNaN(year)) {
                                dateObj = new Date(year, month, day);
                                dateObj.setHours(0,0,0,0);
                                if(dateObj < now) continue;
                                isToday = dateObj.getTime() === now.getTime();
                            }
                        }
                    } catch(e) { continue; }
                }
                
                if(dateObj) {
                    const equipeMembers = [];
                    for(let j=EQUIPE_START; j<=EQUIPE_END && j<row.length; j++) {
                        const member = row[j] || '';
                        if(member.trim()) equipeMembers.push(member.trim());
                    }
                    
                    futureRows.push({
                        type: row[TYPE] || '', client: row[CLIENT] || '', projet: row[PROJET] || '', imp: row[IMP] || '',
                        lieu: row[LIEU] || '', date: dateStr, heure: row[HEURE] || '', equipeMembers, vehicule: row[VEHICULE] || '',
                        dateObj, isToday, uniqueId: `${row[CLIENT]}|${row[PROJET]}|${dateStr}|${row[HEURE]}`
                    });
                    rowCount++;
                    if(isToday) todayCount++;
                }
            }
            futureRows.sort((a,b) => a.dateObj - b.dateObj);
            return { rows: futureRows, todayCount };
        }
        
        function formatDate(dateStr) {
            if(!dateStr) return '-';
            try {
                const parts = dateStr.split('/');
                if(parts.length === 3) {
                    const d = new Date(parts[2], parts[1]-1, parts[0]);
                    const days = ['Di', 'Lu', 'Ma', 'Me', 'Je', 'Ve', 'Sa'];
                    return `${days[d.getDay()]}_${dateStr}`;
                }
            } catch(e) {}
            return dateStr;
        }
        
        function displayData(data) {
            const container = document.getElementById('rowsContainer');
            const totalRows = document.getElementById('totalRows');
            const todayCountSpan = document.getElementById('todayCount');
            
            container.innerHTML = '';
            totalRows.textContent = data.rows.length;
            todayCountSpan.textContent = data.todayCount;
            
            if(data.rows.length === 0) {
                container.innerHTML = `<div class="table-row"><div class="table-cell" style="grid-column:1/-1;text-align:center">Aucune intervention future</div></div>`;
                return;
            }
            
            data.rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'table-row';
                
                if(row.isToday) {
                    rowDiv.classList.add(!row.type || row.type.trim() === '' || row.type === '-' ? 'today-row-empty-type' : 'today-row');
                } else if(!row.type || row.type.trim() === '' || row.type === '-') {
                    rowDiv.classList.add('empty-type-row');
                }
                
                // Type
                const typeCell = document.createElement('div');
                typeCell.className = 'table-cell';
                typeCell.textContent = row.type || '-';
                if(row.type && row.type.toLowerCase().includes('montage')) typeCell.classList.add('triangle-cell');
                if(!row.type) typeCell.classList.add('empty-cell');
                rowDiv.appendChild(typeCell);
                
                // Client
                const clientCell = document.createElement('div');
                clientCell.className = 'table-cell';
                if(newClients.has(row.uniqueId) && !updatedTimes.has(row.uniqueId)) clientCell.classList.add('new-client-highlight');
                clientCell.textContent = row.client || '-';
                if(!row.client) clientCell.classList.add('empty-cell');
                rowDiv.appendChild(clientCell);
                
                // Projet
                const projetCell = document.createElement('div');
                projetCell.className = 'table-cell';
                projetCell.textContent = row.projet || '-';
                if(!row.projet) projetCell.classList.add('empty-cell');
                rowDiv.appendChild(projetCell);
                
                // Imp
                const impCell = document.createElement('div');
                impCell.className = 'table-cell';
                impCell.textContent = row.imp || '-';
                if(!row.imp) impCell.classList.add('empty-cell');
                rowDiv.appendChild(impCell);
                
                // Lieu
                const lieuCell = document.createElement('div');
                lieuCell.className = 'table-cell left-align';
                lieuCell.textContent = row.lieu || '-';
                if(!row.lieu) lieuCell.classList.add('empty-cell');
                rowDiv.appendChild(lieuCell);
                
                // Date
                const dateCell = document.createElement('div');
                dateCell.className = 'table-cell left-align';
                dateCell.textContent = formatDate(row.date);
                if(!row.date) dateCell.classList.add('empty-cell');
                rowDiv.appendChild(dateCell);
                
                // Heure
                const heureCell = document.createElement('div');
                heureCell.className = 'table-cell';
                if(updatedTimes.has(row.uniqueId)) heureCell.classList.add('updated-time-highlight');
                heureCell.textContent = row.heure || '-';
                if(!row.heure) heureCell.classList.add('empty-cell');
                rowDiv.appendChild(heureCell);
                
                // Équipe
                const equipeCell = document.createElement('div');
                equipeCell.className = 'table-cell';
                if(row.equipeMembers && row.equipeMembers.length > 0) {
                    const container = document.createElement('div');
                    container.className = 'equipe-names';
                    row.equipeMembers.forEach(m => {
                        const nameDiv = document.createElement('div');
                        nameDiv.className = 'equipe-name';
                        nameDiv.textContent = m;
                        container.appendChild(nameDiv);
                    });
                    equipeCell.appendChild(container);
                } else {
                    equipeCell.textContent = '-';
                    equipeCell.classList.add('empty-cell');
                }
                rowDiv.appendChild(equipeCell);
                
                // Véhicule
                const vehiculeCell = document.createElement('div');
                vehiculeCell.className = 'table-cell';
                vehiculeCell.textContent = row.vehicule || '-';
                if(!row.vehicule) vehiculeCell.classList.add('empty-cell');
                rowDiv.appendChild(vehiculeCell);
                
                container.appendChild(rowDiv);
            });
        }
        
        async function loadData() {
            const loading = document.getElementById('loading');
            try {
                loading.classList.remove('d-none');
                updateConnectionStatus('checking', 'Connexion...');
                cleanOldHighlights();
                
                const timestamp = Date.now();
                let url = GOOGLE_SHEET_URL;
                url += (url.includes('?') ? '&' : '?') + '_=' + timestamp;
                
                // Utilisation du proxy qui fonctionnait avant
                const proxyUrl = 'https://corsproxy.io/?';
                const response = await fetch(proxyUrl + encodeURIComponent(url));
                
                if(!response.ok) throw new Error(`HTTP ${response.status}`);
                const csvText = await response.text();
                
                if(csvText.includes('<!DOCTYPE') || csvText.includes('<html')) throw new Error('Lien expiré');
                if(!csvText || csvText.trim().length < 10) throw new Error('Fichier vide');
                
                const rows = parseCSV(csvText);
                const processedData = processDataWithFilter(rows);
                detectChanges(processedData.rows);
                displayData(processedData);
                
                document.getElementById('lastUpdateTime').textContent = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                updateConnectionStatus('connected', `Données chargées (${processedData.rows.length})`);
                
            } catch(error) {
                console.error(error);
                let msg = error.message;
                updateConnectionStatus('disconnected', msg);
                document.getElementById('rowsContainer').innerHTML = `<div class="table-row"><div class="table-cell" style="grid-column:1/-1;text-align:center;color:#e74c3c">❌ Erreur: ${msg}<br><button onclick="showEditLinkModal()" style="margin-top:8px">🔗 Éditer le lien</button></div></div>`;
            } finally {
                setTimeout(() => loading.classList.add('d-none'), 500);
            }
        }
        
        async function testLink(url) {
            try {
                const proxyUrl = 'https://corsproxy.io/?';
                const testUrl = proxyUrl + encodeURIComponent(url + '?_=' + Date.now());
                const res = await fetch(testUrl, { method: 'HEAD' });
                return res.ok;
            } catch { return false; }
        }
        
        async function saveNewLink() {
            const newLink = document.getElementById('newSheetLink').value.trim();
            const statusDiv = document.getElementById('linkStatus');
            if(!newLink) { alert('Veuillez coller un lien'); return; }
            statusDiv.style.display = 'block';
            statusDiv.style.background = '#d1ecf1';
            statusDiv.textContent = '🔍 Test...';
            const ok = await testLink(newLink);
            if(ok) {
                GOOGLE_SHEET_URL = newLink;
                localStorage.setItem('saved_sheet_url', newLink);
                statusDiv.style.background = '#d4edda';
                statusDiv.textContent = '✅ Lien sauvegardé !';
                setTimeout(() => { hideEditLinkModal(); loadData(); }, 1500);
            } else {
                statusDiv.style.background = '#f8d7da';
                statusDiv.textContent = '❌ Lien invalide';
            }
        }
        
        function initialize() {
            hideAllModals();
            loadHighlightState();
            updateClock();
            setInterval(updateClock, 1000);
            setInterval(cleanOldHighlights, 60000);
            loadData();
            setInterval(() => { if(connectionStatus === 'connected') loadData(); }, AUTO_REFRESH_MINUTES * 60000);
        }
        
        document.addEventListener('DOMContentLoaded', initialize);
        document.getElementById('refreshBtn').addEventListener('click', loadData);
    </script>
</body>
</html>
