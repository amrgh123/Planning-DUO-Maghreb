<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Planning DUO Maghreb</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            overflow-x: auto;
        }
        
        /* Conteneur principal - responsive */
        .tv-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
        }
        
        /* En-tête responsive */
        .tv-header {
            background: linear-gradient(135deg, #2c3e50, #4a6491);
            padding: 10px 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        .tv-header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .tv-clock {
            text-align: right;
        }
        
        .tv-time {
            font-size: 1.1rem;
            font-weight: 700;
            background: rgba(0,0,0,0.2);
            padding: 5px 10px;
            border-radius: 8px;
        }
        
        .tv-date {
            font-size: 0.8rem;
            margin-top: 2px;
            opacity: 0.9;
        }
        
        /* Zone principale - overflow horizontal si nécessaire */
        .tv-main-area {
            flex: 1;
            padding: 8px;
            overflow-x: auto;
        }
        
        .table-wrapper {
            background-color: #2c3e50;
            border-radius: 8px;
            overflow-x: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        /* Tableau responsive - version smartphone (défilement horizontal) */
        .planning-table {
            min-width: 800px;
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            color: #333;
        }
        
        .planning-table th {
            background: linear-gradient(135deg, #34495e, #2c3e50);
            color: white;
            padding: 8px 5px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            text-align: center;
            border: 1px solid #3a506b;
        }
        
        .planning-table td {
            padding: 6px 4px;
            font-size: 0.7rem;
            text-align: center;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }
        
        .planning-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        
        .planning-table tr:hover {
            background-color: #e9ecef;
        }
        
        /* Ligne du jour en rouge */
        .today-row {
            background-color: #e74c3c !important;
            color: white !important;
        }
        
        .today-row td {
            color: white !important;
            font-weight: 700;
        }
        
        .today-row-empty-type {
            background-color: #c0392b !important;
            color: white !important;
        }
        
        .empty-type-row {
            color: #7f8c8d !important;
            background-color: #f1f2f3 !important;
        }
        
        .triangle-cell {
            color: #e74c3c;
            font-weight: 700;
        }
        
        .triangle-cell::before {
            content: "▲";
            margin-right: 3px;
            font-size: 0.7rem;
            color: #e74c3c;
        }
        
        .empty-cell {
            color: #95a5a6;
            font-style: italic;
        }
        
        /* Équipe - noms côte à côte */
        .equipe-names {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
        }
        
        .equipe-name {
            font-size: 0.7rem;
        }
        
        .equipe-name:not(:last-child)::after {
            content: " - ";
            margin-left: 4px;
        }
        
        /* Barre de statut responsive */
        .tv-status {
            background-color: rgba(0,0,0,0.8);
            color: white;
            padding: 6px 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
        
        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        /* Modals */
        .connection-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26,26,26,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }
        
        .notification {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #27ae60;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            z-index: 10000;
            display: none;
            font-size: 0.8rem;
        }
        
        .modal-content {
            background: white;
            padding: 15px;
            border-radius: 8px;
            max-width: 90%;
            width: 400px;
            text-align: center;
            color: #333;
        }
        
        .new-client-highlight {
            font-weight: 800 !important;
            color: #ffffff !important;
            background-color: #2ecc71;
            border-radius: 4px;
            padding: 2px 4px !important;
        }
        
        .new-client-highlight::before {
            content: "🆕";
            margin-right: 4px;
            font-size: 0.7rem;
        }
        
        .updated-time-highlight {
            font-weight: 800 !important;
            color: #ffffff !important;
            background-color: #f39c12;
            border-radius: 4px;
            padding: 2px 4px !important;
        }
        
        .updated-time-highlight::before {
            content: "🕒";
            margin-right: 4px;
            font-size: 0.7rem;
        }
        
        /* Version TV 32" (écran large) */
        @media (min-width: 1200px) {
            .tv-header h1 { font-size: 2rem; }
            .tv-time { font-size: 1.5rem; padding: 8px 15px; }
            .tv-date { font-size: 1rem; }
            .planning-table th { font-size: 1rem; padding: 12px 8px; }
            .planning-table td { font-size: 0.9rem; padding: 10px 6px; }
            .equipe-name { font-size: 0.85rem; }
            .tv-status { font-size: 0.9rem; }
            .refresh-btn { font-size: 0.9rem; padding: 6px 12px; }
        }
        
        /* Version très petit smartphone */
        @media (max-width: 480px) {
            .tv-header h1 { font-size: 0.9rem; }
            .tv-time { font-size: 0.8rem; }
            .tv-date { font-size: 0.65rem; }
        }
        
        /* Animation flash */
        @keyframes pulseFlash {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        
        .highlight-cell {
            animation: pulseFlash 1s ease-in-out 3;
        }
    </style>
</head>
<body>
    <div class="tv-container">
        <div class="tv-header">
            <h1>📅 PLANNING DES PROJETS</h1>
            <div class="tv-clock">
                <div id="realTimeClock" class="tv-time">--:--:--</div>
                <div id="currentDate" class="tv-date">-- --- ----</div>
            </div>
        </div>
        
        <div class="tv-main-area">
            <div class="table-wrapper">
                <table class="planning-table" id="planningTable">
                    <thead>
                        <tr>
                            <th>Type</th><th>Client</th><th>Projet</th><th>Imp</th><th>Lieu</th><th>Date</th><th>Heure</th><th>Équipe</th><th>Véhicule</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="9" style="text-align:center">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="tv-status">
            <div>
                <span id="totalRows">0</span> interventions | 
                <span id="todayCount">0</span> aujourd'hui
                <span class="connection-status" id="connectionStatus">
                    <span class="status-indicator" id="statusIndicator" style="background:#f39c12"></span>
                    <span id="statusText">Vérification...</span>
                </span>
                <span id="newClientsIndicator" style="margin-left: 8px; display: none;">🆕 <span id="newClientsCount">0</span></span>
            </div>
            <div>
                <button id="refreshBtn" class="refresh-btn">🔄 ACTUALISER</button>
                <button onclick="showEditLinkModal()" class="btn-outline-light ms-2" style="background:transparent;border:1px solid white;color:white;padding:4px 8px;border-radius:5px;margin-left:5px;font-size:0.7rem">🔗 Lien</button>
            </div>
            <div id="lastUpdated">MAJ: <span id="lastUpdateTime">--:--</span></div>
        </div>
        
        <div id="loading" class="loading-overlay d-none">
            <div class="spinner-border text-primary" style="width:2rem;height:2rem" role="status"></div>
            <p class="mt-2 text-white" style="font-size:0.9rem">Chargement...</p>
        </div>
        
        <div id="notification" class="notification"></div>
        
        <!-- Modal édition lien -->
        <div id="editLinkModal" class="connection-modal">
            <div class="modal-content">
                <h3 style="color:#3498db;font-size:1.1rem">✏️ Mettre à jour le lien</h3>
                <div style="text-align:left;margin:10px 0">
                    <label style="font-size:0.8rem">Lien actuel :</label>
                    <div style="background:#f8f9fa;padding:6px;border-radius:4px;font-size:0.7rem;word-break:break-all" id="currentLinkDisplay"></div>
                    <label style="font-size:0.8rem;margin-top:10px">Nouveau lien :</label>
                    <input type="text" id="newSheetLink" style="width:100%;padding:6px;border:1px solid #3498db;border-radius:4px;font-size:0.8rem">
                </div>
                <div id="linkStatus" style="padding:6px;border-radius:4px;margin:8px 0;display:none;font-size:0.7rem"></div>
                <div>
                    <button onclick="saveNewLink()" class="btn btn-success" style="font-size:0.7rem;padding:4px 8px">💾 Enregistrer</button>
                    <button onclick="hideEditLinkModal()" class="btn btn-secondary" style="font-size:0.7rem;padding:4px 8px">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const DEFAULT_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSSg3azNidCrk7DOWOCJPCjoplrmuMB9LUs876C4EcRWyePwzBpE8CRbEQSreOwHUC0x6Ux9w8HTvu7/pub?gid=432489701&single=true&output=csv';
        
        let GOOGLE_SHEET_URL = localStorage.getItem('saved_sheet_url') || DEFAULT_SHEET_URL;
        let previousData = [];
        let newClients = new Map();
        let updatedTimes = new Map();
        let connectionStatus = 'checking';
        
        // ============================================
        // FONCTIONS
        // ============================================
        
        function updateClock() {
            const now = new Date();
            document.getElementById('realTimeClock').textContent = now.toLocaleTimeString('fr-FR');
            document.getElementById('currentDate').textContent = now.toLocaleDateString('fr-FR', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            }).replace(/^\w/, c => c.toUpperCase());
        }
        
        function showNotification(msg) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 3000);
        }
        
        function updateConnectionStatus(status, msg) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            connectionStatus = status;
            if(indicator) indicator.style.backgroundColor = status === 'connected' ? '#2ecc71' : (status === 'disconnected' ? '#e74c3c' : '#f39c12');
            if(text) text.textContent = status === 'connected' ? 'Connecté' : (status === 'disconnected' ? 'Déconnecté' : 'Vérification...');
            if(msg) console.log(msg);
        }
        
        function hideAllModals() {
            document.getElementById('editLinkModal').style.display = 'none';
        }
        
        function showEditLinkModal() {
            hideAllModals();
            document.getElementById('editLinkModal').style.display = 'flex';
            document.getElementById('currentLinkDisplay').textContent = GOOGLE_SHEET_URL;
            document.getElementById('newSheetLink').value = '';
            document.getElementById('linkStatus').style.display = 'none';
        }
        
        function hideEditLinkModal() { hideAllModals(); }
        
        // Nettoyer anciens highlights
        function cleanOldHighlights() {
            const now = Date.now();
            const HIGHLIGHT_DURATION = 60 * 60 * 1000;
            for (const [id, ts] of newClients) if (now - ts > HIGHLIGHT_DURATION) newClients.delete(id);
            for (const [id, ts] of updatedTimes) if (now - ts > HIGHLIGHT_DURATION) updatedTimes.delete(id);
        }
        
        function parseCSV(text) {
            const rows = [];
            const lines = text.split(/\r?\n/);
            for(let line of lines) {
                if(!line.trim()) continue;
                const row = [];
                let current = '', inQuotes = false;
                for(let i=0; i<line.length; i++) {
                    const c = line[i];
                    if(c === '"') inQuotes = !inQuotes;
                    else if(c === ',' && !inQuotes) { row.push(current.trim()); current = ''; }
                    else current += c;
                }
                row.push(current.trim());
                rows.push(row);
            }
            return rows;
        }
        
        function processData(rows) {
            const now = new Date(); now.setHours(0,0,0,0);
            const futureRows = [];
            let todayCount = 0, startIndex = 0;
            
            if(rows.length > 0) {
                const firstRow = rows[0];
                const isHeader = firstRow.some(cell => cell && typeof cell === 'string' && 
                    ['type','client','projet','lieu','date','heure','équipe','equipe'].some(k => cell.toLowerCase().includes(k)));
                if(isHeader) startIndex = 1;
            }
            
            const TYPE=0, CLIENT=1, PROJET=2, IMP=21, LIEU=3, DATE=4, HEURE=5, VEHICULE=22;
            const EQUIPE_START=6, EQUIPE_END=20;
            let rowCount = 0;
            
            for(let i=startIndex; i<rows.length && rowCount<20; i++) {
                const row = rows[i];
                if(row.length <= DATE) continue;
                const dateStr = row[DATE] || '';
                if(!dateStr) continue;
                
                let dateObj = null, isToday = false;
                if(dateStr.includes('/')) {
                    try {
                        const parts = dateStr.split('/');
                        if(parts.length === 3) {
                            const day = parseInt(parts[0]), month = parseInt(parts[1])-1, year = parseInt(parts[2]);
                            if(!isNaN(day) && !isNaN(month) && !isNaN(year)) {
                                dateObj = new Date(year, month, day);
                                dateObj.setHours(0,0,0,0);
                                if(dateObj < now) continue;
                                isToday = dateObj.getTime() === now.getTime();
                            }
                        }
                    } catch(e) { continue; }
                }
                
                if(dateObj) {
                    const equipeMembers = [];
                    for(let j=EQUIPE_START; j<=EQUIPE_END && j<row.length; j++) {
                        const member = row[j] || '';
                        if(member.trim()) equipeMembers.push(member.trim());
                    }
                    
                    futureRows.push({
                        type: row[TYPE] || '', client: row[CLIENT] || '', projet: row[PROJET] || '', imp: row[IMP] || '',
                        lieu: row[LIEU] || '', date: dateStr, heure: row[HEURE] || '', equipeMembers, vehicule: row[VEHICULE] || '',
                        dateObj, isToday, uniqueId: `${row[CLIENT]}|${row[PROJET]}|${dateStr}|${row[HEURE]}`
                    });
                    rowCount++;
                    if(isToday) todayCount++;
                }
            }
            futureRows.sort((a,b) => a.dateObj - b.dateObj);
            return { rows: futureRows, todayCount };
        }
        
        function formatDate(dateStr) {
            if(!dateStr) return '-';
            try {
                const parts = dateStr.split('/');
                if(parts.length === 3) {
                    const d = new Date(parts[2], parts[1]-1, parts[0]);
                    const days = ['Di', 'Lu', 'Ma', 'Me', 'Je', 'Ve', 'Sa'];
                    return `${days[d.getDay()]}_${dateStr}`;
                }
            } catch(e) {}
            return dateStr;
        }
        
        function displayData(data) {
            const tbody = document.getElementById('tableBody');
            const totalRows = document.getElementById('totalRows');
            const todayCountSpan = document.getElementById('todayCount');
            const newIndicator = document.getElementById('newClientsIndicator');
            const newCountSpan = document.getElementById('newClientsCount');
            
            totalRows.textContent = data.rows.length;
            todayCountSpan.textContent = data.todayCount;
            
            const totalNew = newClients.size + updatedTimes.size;
            if(totalNew > 0) {
                newIndicator.style.display = 'inline';
                newCountSpan.textContent = totalNew;
            } else {
                newIndicator.style.display = 'none';
            }
            
            if(data.rows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center">Aucune intervention future</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            data.rows.forEach(row => {
                const tr = document.createElement('tr');
                if(row.isToday) {
                    tr.classList.add(!row.type || row.type.trim() === '' || row.type === '-' ? 'today-row-empty-type' : 'today-row');
                } else if(!row.type || row.type.trim() === '' || row.type === '-') {
                    tr.classList.add('empty-type-row');
                }
                
                // Type
                const tdType = document.createElement('td');
                tdType.textContent = row.type || '-';
                if(row.type && row.type.toLowerCase().includes('montage')) tdType.classList.add('triangle-cell');
                if(!row.type) tdType.classList.add('empty-cell');
                tr.appendChild(tdType);
                
                // Client
                const tdClient = document.createElement('td');
                tdClient.textContent = row.client || '-';
                if(newClients.has(row.uniqueId) && !updatedTimes.has(row.uniqueId)) tdClient.classList.add('new-client-highlight');
                if(!row.client) tdClient.classList.add('empty-cell');
                tr.appendChild(tdClient);
                
                // Projet
                const tdProjet = document.createElement('td');
                tdProjet.textContent = row.projet || '-';
                if(!row.projet) tdProjet.classList.add('empty-cell');
                tr.appendChild(tdProjet);
                
                // Imp
                const tdImp = document.createElement('td');
                tdImp.textContent = row.imp || '-';
                if(!row.imp) tdImp.classList.add('empty-cell');
                tr.appendChild(tdImp);
                
                // Lieu
                const tdLieu = document.createElement('td');
                tdLieu.textContent = row.lieu || '-';
                if(!row.lieu) tdLieu.classList.add('empty-cell');
                tr.appendChild(tdLieu);
                
                // Date
                const tdDate = document.createElement('td');
                tdDate.textContent = formatDate(row.date);
                if(!row.date) tdDate.classList.add('empty-cell');
                tr.appendChild(tdDate);
                
                // Heure
                const tdHeure = document.createElement('td');
                tdHeure.textContent = row.heure || '-';
                if(updatedTimes.has(row.uniqueId)) tdHeure.classList.add('updated-time-highlight');
                if(!row.heure) tdHeure.classList.add('empty-cell');
                tr.appendChild(tdHeure);
                
                // Équipe
                const tdEquipe = document.createElement('td');
                if(row.equipeMembers && row.equipeMembers.length > 0) {
                    const container = document.createElement('div');
                    container.className = 'equipe-names';
                    row.equipeMembers.forEach(m => {
                        const span = document.createElement('span');
                        span.className = 'equipe-name';
                        span.textContent = m;
                        container.appendChild(span);
                    });
                    tdEquipe.appendChild(container);
                } else {
                    tdEquipe.textContent = '-';
                    tdEquipe.classList.add('empty-cell');
                }
                tr.appendChild(tdEquipe);
                
                // Véhicule
                const tdVehicule = document.createElement('td');
                tdVehicule.textContent = row.vehicule || '-';
                if(!row.vehicule) tdVehicule.classList.add('empty-cell');
                tr.appendChild(tdVehicule);
                
                tbody.appendChild(tr);
            });
        }
        
        async function loadData() {
            const loading = document.getElementById('loading');
            try {
                loading.classList.remove('d-none');
                updateConnectionStatus('checking', 'Connexion...');
                cleanOldHighlights();
                
                const timestamp = Date.now();
                let url = GOOGLE_SHEET_URL;
                url += (url.includes('?') ? '&' : '?') + '_=' + timestamp;
                
                // Utilisation de api.allorigins.win (plus fiable sur GitHub Pages)
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const response = await fetch(proxyUrl + encodeURIComponent(url));
                
                if(!response.ok) throw new Error(`HTTP ${response.status}`);
                const csvText = await response.text();
                
                if(csvText.includes('<!DOCTYPE') || csvText.includes('<html')) throw new Error('Lien expiré');
                if(!csvText || csvText.trim().length < 10) throw new Error('Fichier vide');
                
                const rows = parseCSV(csvText);
                const processedData = processData(rows);
                displayData(processedData);
                
                document.getElementById('lastUpdateTime').textContent = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                updateConnectionStatus('connected', `OK (${processedData.rows.length})`);
                
                // Mise à jour des données précédentes pour détection (simplifiée)
                previousData = processedData.rows.slice();
                
            } catch(error) {
                console.error(error);
                let msg = error.message;
                updateConnectionStatus('disconnected', msg);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="9" style="text-align:center;color:#e74c3c">❌ Erreur: ${msg}<br><button onclick="showEditLinkModal()" style="margin-top:8px;padding:4px 8px">🔗 Éditer le lien</button></td></tr>`;
            } finally {
                setTimeout(() => loading.classList.add('d-none'), 500);
            }
        }
        
        async function saveNewLink() {
            const newLink = document.getElementById('newSheetLink').value.trim();
            const statusDiv = document.getElementById('linkStatus');
            if(!newLink) { alert('Veuillez coller un lien'); return; }
            statusDiv.style.display = 'block';
            statusDiv.style.background = '#d1ecf1';
            statusDiv.textContent = '🔍 Test...';
            
            try {
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const testUrl = proxyUrl + encodeURIComponent(newLink + '?_=' + Date.now());
                const res = await fetch(testUrl);
                if(res.ok) {
                    GOOGLE_SHEET_URL = newLink;
                    localStorage.setItem('saved_sheet_url', newLink);
                    statusDiv.style.background = '#d4edda';
                    statusDiv.textContent = '✅ Lien sauvegardé !';
                    setTimeout(() => { hideEditLinkModal(); loadData(); }, 1500);
                } else {
                    statusDiv.style.background = '#f8d7da';
                    statusDiv.textContent = '❌ Lien invalide';
                }
            } catch(e) {
                statusDiv.style.background = '#f8d7da';
                statusDiv.textContent = '❌ Lien invalide';
            }
        }
        
        function initialize() {
            updateClock();
            setInterval(updateClock, 1000);
            loadData();
            setInterval(() => { if(connectionStatus === 'connected') loadData(); }, 5 * 60000);
        }
        
        document.addEventListener('DOMContentLoaded', initialize);
        document.getElementById('refreshBtn').addEventListener('click', loadData);
    </script>
</body>
</html>
